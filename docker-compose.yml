services:
  db:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: chamadoscondominio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: app-condominio
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/chamadoscondominio
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
